<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Scanner</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#00ff00;
    font-family:Consolas, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#terminal{
    width:90%;
    max-width:800px;
    white-space:pre-line;
    font-size:18px;
    line-height:1.8;
}

</style>

</head>

<body>

<div id="terminal">
Initializing...
</div>

<script>
const terminal = document.getElementById("terminal");

const lines = [
"Initializing...",
"",
"Connecting to Secure Server...",
"",
"Access Granted ✔",
"",
"Finding WhatsApp...",
"",
"Scanning Gallery...",
"",
"Loading..."
];

let i = 0;

function typeLine(){
    if(i < lines.length){
        terminal.innerHTML += lines[i] + "<br>";
        terminal.scrollTop = terminal.scrollHeight;
        i++;
        setTimeout(typeLine, 900);
    }
}

terminal.innerHTML = "";
typeLine();
setTimeout(() => {

let progress = 0;

const loader = setInterval(() => {

progress += 5;

terminal.innerHTML += "Loading: " + progress + "%<br>";

if(progress >= 100){
clearInterval(loader);
}

},200);

},11000);
setTimeout(() => {

terminal.innerHTML += "<br>Searching Contacts...<br>";

}, 15000);


setTimeout(() => {

terminal.innerHTML += "WhatsApp Data Found ✔<br>";

}, 18000);


setTimeout(() => {

terminal.innerHTML += "Downloading Chats...<br>";

}, 21000);


setTimeout(() => {

terminal.innerHTML += "Photos Scanned: 327<br>";

}, 24000);


setTimeout(() => {

terminal.innerHTML += "Private Files Found...<br>";

}, 27000);
setTimeout(() => {

terminal.innerHTML += 
"<br><br>😂 OYE BHAI!! 😂<br><br>" +
"Relax... tera phone hack nahi hua 😆<br>" +
"Ye sirf ek prank tha ❤️<br><br>" +
"Mission Complete ✅";

}, 32000);
</script>

</body>
</html>
